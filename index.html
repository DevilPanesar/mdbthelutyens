<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saddi Duniya</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #c {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .ring {
      width: 52px;
      height: 52px;
      border: 3px solid rgba(255, 255, 255, 0.07);
      border-top-color: rgba(80, 160, 255, 0.9);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading p {
      color: rgba(100, 180, 255, 0.65);
      font-size: 11px;
      letter-spacing: 3px;
    }



    /* ── Menu button ── */
    #menu-btn {
      position: fixed;
      top: 20px;
      right: 24px;
      width: 48px;
      height: 48px;
      background: rgba(30, 30, 40, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      z-index: 300;
      backdrop-filter: blur(12px);
      transition: background 0.2s;
    }

    #menu-btn:hover {
      background: rgba(50, 50, 65, 0.9);
    }

    #menu-btn span {
      display: block;
      width: 20px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
    }

    /* ── Flag pins ── */
    .flag-marker {
      position: fixed;
      pointer-events: auto;
      cursor: pointer;
      transform: translate(-50%, -100%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.3s;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
    }

    .pin-icon {
      width: 36px;
      height: 48px;
      transition: transform 0.2s;
    }

    .pin-icon svg {
      width: 100%;
      height: 100%;
    }

    .flag-marker:hover .pin-icon {
      transform: scale(1.15);
    }

    .flag-marker.active-flag .pin-icon {
      transform: scale(1.2);
      filter: brightness(1.1);
    }

    /* ── Bottom panel ── */
    #bottom-panel {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .panel-row {
      display: flex;
      align-items: flex-end;
      gap: 14px;
    }

    .side-flags {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 4px;
    }

    .side-flag {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2.5px solid rgba(255, 255, 255, 0.22);
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
      transition: transform 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .side-flag:hover {
      transform: scale(1.1);
      border-color: rgba(255, 255, 255, 0.55);
    }

    .side-flag img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info-card {
      background: rgba(14, 14, 20, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 16px 20px 15px;
      min-width: 240px;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.85);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 13px;
    }

    .card-flag-img {
      width: 36px;
      height: 24px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.18);
      flex-shrink: 0;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .card-sub {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 2px;
    }

    .explore-btn {
      width: 100%;
      padding: 12px 0;
      background: linear-gradient(90deg, #d94e0c, #f07828);
      border: none;
      border-radius: 11px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(220, 80, 20, 0.4);
    }

    .explore-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    /* ── Dots ── */
    #dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .dot.active {
      background: #fff;
      transform: scale(1.15);
    }

    /* ── Branding ── */
    #branding {
      position: fixed;
      bottom: 20px;
      right: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 300;
    }

    #branding-text {
      text-align: right;
      line-height: 1.25;
    }

    #branding-text .b1 {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.5px;
    }

    #branding-text .b2 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    #branding-logo {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #fff;
      font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <!-- Loading screen -->
  <div id="loading">
    <div class="ring"></div>
    <p>LOADING</p>
  </div>

  <!-- 3-D canvas -->
  <canvas id="c"></canvas>

  <!-- Hamburger -->
  <div id="menu-btn"><span></span><span></span><span></span></div>

  <!-- Flag pins injected by JS -->
  <div id="flags-container"></div>

  <!-- Bottom info panel -->
  <div id="bottom-panel">
    <div class="panel-row">
      <div class="side-flags" id="side-flags"></div>
      <div class="info-card">
        <div class="card-header">
          <img class="card-flag-img" id="card-flag-img" src="" alt="">
          <div>
            <div class="card-title" id="card-name"></div>
            <div class="card-sub" id="card-sub"></div>
          </div>
        </div>
        <button class="explore-btn" id="explore-btn" onclick="window.location.href='Subpage/index.html'">Explore</button>
      </div>
    </div>
    <div id="dots"></div>
  </div>

  <!-- Branding -->
  <div id="branding">
    <div id="branding-text">
      <div class="b1">The World</div>
      <div class="b2">of Aldar</div>
    </div>
    <div id="branding-logo">ALDAR</div>
  </div>

  <!-- Three.js ES-module import map -->
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

 <script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ── Locations ────────────────────────────────────────────────
  const LOCATIONS = [
    {
      id: 'punjab', name: 'Punjab, India',
      sub: 'India · 3 Projects',
      lat: 31.1, lon: 75.3, zoomDist: 2.8,
      flag: 'https://flagcdn.com/w80/in.png'
    },
    {
      id: 'canada', name: 'Canada',
      sub: 'North America · 5 Projects',
      lat: 45.5, lon: -75.5, zoomDist: 3.0,
      flag: 'https://flagcdn.com/w80/ca.png'
    },
  ];

  let activeIndex = 0;

  // ── Renderer ─────────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000000, 1);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  // ── Scene / Camera ───────────────────────────────────────────
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.01, 5000);
  camera.position.set(0, 1.2, 4.4);

  // ── Orbit Controls ───────────────────────────────────────────
  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.04;
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.autoRotate = false;
  controls.target.set(0, 0, 0);
  controls.update();

  // ── Lights ───────────────────────────────────────────────────
  const sun = new THREE.DirectionalLight(0xfff5ee, 4.0);
  sun.position.set(-5, 6, 3);
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0x0a0e1a, 2.5));
  const fill = new THREE.DirectionalLight(0x0d1f44, 0.4);
  fill.position.set(4, -3, -4);
  scene.add(fill);

  // ── Starfield ────────────────────────────────────────────────
  (function buildStars() {
    const W = 4096, H = 2048;
    const cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    [
      { x: .06, y: .52, r: .24, a: .20 },
      { x: .83, y: .18, r: .18, a: .12 }
    ].forEach(n => {
      const g = ctx.createRadialGradient(n.x*W, n.y*H, 0, n.x*W, n.y*H, n.r*W);
      g.addColorStop(0, `rgba(48,52,80,${n.a})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    });
    for (let i = 0; i < 6000; i++) {
      const x = Math.random()*W, y = Math.random()*H;
      ctx.beginPath();
      ctx.arc(x, y, Math.random()*0.65+0.12, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${(Math.random()*0.4+0.12).toFixed(2)})`;
      ctx.fill();
    }
    for (let i = 0; i < 550; i++) {
      const x = Math.random()*W, y = Math.random()*H;
      ctx.beginPath();
      ctx.arc(x, y, Math.random()*0.85+0.45, 0, Math.PI*2);
      ctx.fillStyle = `rgba(195,215,255,${(Math.random()*0.4+0.38).toFixed(2)})`;
      ctx.fill();
    }
    scene.background = new THREE.CanvasTexture(cv);
  })();

  // ── Atmosphere ───────────────────────────────────────────────
  let atmoMeshes = [];
  function buildAtmo(rad) {
    atmoMeshes.forEach(m => scene.remove(m));
    atmoMeshes = [];
    const mat = new THREE.ShaderMaterial({
      transparent: true, depthWrite: false, side: THREE.BackSide,
      uniforms: { sunDir: { value: new THREE.Vector3(-5,6,3).normalize() } },
      vertexShader: `
        varying vec3 vN, vV;
        void main() {
          vN = normalize(normalMatrix * normal);
          vV = normalize(-(modelViewMatrix * vec4(position,1.0)).xyz);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }`,
      fragmentShader: `
        varying vec3 vN, vV;
        uniform vec3 sunDir;
        void main() {
          float rim = pow(1.0 - clamp(dot(vV,vN),0.0,1.0), 3.0);
          float s   = clamp(dot(vN,sunDir)*1.8+0.55, 0.0, 1.0);
          vec3  col = mix(vec3(0.2,0.5,1.0), vec3(0.5,0.75,1.0), rim);
          gl_FragColor = vec4(col, rim*s*0.8);
        }`,
    });
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(rad*1.012, 128, 128), mat);
    scene.add(mesh);
    atmoMeshes.push(mesh);
  }

  // ── Earth Group ──────────────────────────────────────────────
  const earthGroup = new THREE.Group();
  scene.add(earthGroup);
  let earthRadius = 1.0;

  function clearEarth() {
    while (earthGroup.children.length)
      earthGroup.remove(earthGroup.children[0]);
  }

  function buildPlaceholder() {
    clearEarth();
    earthGroup.add(new THREE.Mesh(
      new THREE.SphereGeometry(1, 64, 64),
      new THREE.MeshPhongMaterial({ color: 0x1a6088, emissive: 0x020c18 })
    ));
    earthRadius = 1.0;
    buildAtmo(1.0);
  }
  buildPlaceholder();

  // ── GLB Loader ───────────────────────────────────────────────
  const gltfLoader = new GLTFLoader();
  const loadingEl   = document.getElementById('loading');
  const loadingText = document.querySelector('#loading p');

  function loadGLB(url) {
    loadingEl.style.display = 'flex';
    loadingText.textContent = 'LOADING';
    clearEarth();
    atmoMeshes.forEach(m => scene.remove(m));
    atmoMeshes = [];

    gltfLoader.load(url,
      gltf => {
        const model = gltf.scene;
        const box  = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const s = 2.1 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(s);
        model.position.sub(center.multiplyScalar(s));
        model.traverse(ch => {
          if (!ch.isMesh || !ch.material) return;
          const m = ch.material;
          ['map','normalMap','roughnessMap','metalnessMap','aoMap','emissiveMap'].forEach(k => {
            if (m[k]) { m[k].anisotropy = renderer.capabilities.getMaxAnisotropy(); m[k].needsUpdate = true; }
          });
          if (m.isMeshStandardMaterial) {
            m.roughness = Math.max(m.roughness ?? 0.6, 0.3);
            m.metalness = Math.min(m.metalness ?? 0.0, 0.05);
          }
          m.needsUpdate = true;
        });
        earthGroup.add(model);
        const nb = new THREE.Box3().setFromObject(earthGroup);
        const ns = nb.getSize(new THREE.Vector3());
        earthRadius = Math.max(ns.x, ns.y, ns.z) / 2;
        buildAtmo(earthRadius);
        rebuildFlags();
        selectLocation(activeIndex, false);
        loadingEl.style.display = 'none';
      },
      xhr => {
        if (xhr.total)
          loadingText.textContent = `LOADING ${Math.round(xhr.loaded / xhr.total * 100)}%`;
      },
      err => {
        console.error('GLB error:', err);
        buildPlaceholder();
        rebuildFlags();
        loadingEl.style.display = 'none';
      }
    );
  }

  // ── Coordinate helper ────────────────────────────────────────
  function latLonTo3D(lat, lon, radius) {
    const phi   = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(-lon);
    return new THREE.Vector3(
      radius * Math.sin(phi) * Math.cos(theta),
      radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.sin(theta)
    );
  }

  // ── Flag pins ────────────────────────────────────────────────
  let flagEls = [];
  function rebuildFlags() {
    const cont = document.getElementById('flags-container');
    cont.innerHTML = '';
    flagEls = [];
    LOCATIONS.forEach((loc, i) => {
      const el = document.createElement('div');
      el.className = 'flag-marker' + (i === activeIndex ? ' active-flag' : '');
      el.innerHTML = `
        <div class="pin-icon">
          <svg viewBox="0 0 36 48" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="pg${i}" cx="40%" cy="35%">
                <stop offset="0%"   stop-color="#ff6b3d"/>
                <stop offset="100%" stop-color="#d63a00"/>
              </radialGradient>
            </defs>
            <path d="M18 0C8.06 0 0 8.06 0 18c0 12.6 18 30 18 30s18-17.4 18-30C36 8.06 27.94 0 18 0z"
                  fill="url(#pg${i})"/>
            <circle cx="18" cy="17" r="7" fill="white" opacity="0.9"/>
          </svg>
        </div>`;
      el.addEventListener('click', () => selectLocation(i));
      cont.appendChild(el);
      flagEls.push({ el, loc, pos3D: latLonTo3D(loc.lat, loc.lon, earthRadius) });
    });
  }
  rebuildFlags();

  // ── Dots ─────────────────────────────────────────────────────
  function buildDots() {
    const d = document.getElementById('dots');
    d.innerHTML = '';
    LOCATIONS.forEach((_, i) => {
      const el = document.createElement('div');
      el.className = 'dot' + (i === activeIndex ? ' active' : '');
      el.addEventListener('click', () => selectLocation(i));
      d.appendChild(el);
    });
  }
  buildDots();

  // ── Select location ──────────────────────────────────────────
  function selectLocation(index, animate = true) {
    activeIndex = index;
    const loc = LOCATIONS[index];

    document.getElementById('card-name').textContent = loc.name;
    document.getElementById('card-sub').textContent  = loc.sub;
    document.getElementById('card-flag-img').src     = loc.flag;

    // ✅ Explore button passes correct location id
    document.getElementById('explore-btn').onclick = () =>
      window.location.href = `Subpage/index.html?location=${loc.id}`;

    flagEls.forEach((f, i) => f.el.classList.toggle('active-flag', i === index));

    const sideEl = document.getElementById('side-flags');
    sideEl.innerHTML = '';
    LOCATIONS.forEach((other, i) => {
      if (i === index) return;
      const div = document.createElement('div');
      div.className = 'side-flag';
      div.innerHTML = `<img src="${other.flag}" alt="${other.name}">`;
      div.addEventListener('click', () => selectLocation(i));
      sideEl.appendChild(div);
    });

    document.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('active', i === index)
    );

    if (animate) zoomToLocation(loc);
  }

  // ── Camera animation ─────────────────────────────────────────
  function easeInOut(t) {
    t = Math.min(Math.max(t, 0), 1);
    return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
  }

  let animating = false;
  let animRafId = null;

  function zoomToLocation(loc) {
    if (animRafId !== null) { cancelAnimationFrame(animRafId); animRafId = null; }
    controls.enableDamping = false;

    const targetPos = latLonTo3D(loc.lat, loc.lon, earthRadius)
      .normalize().multiplyScalar(loc.zoomDist);
    const startPos    = camera.position.clone();
    const startFOV    = camera.fov;
    const startTarget = controls.target.clone();
    const endTarget   = new THREE.Vector3(0, 0, 0);
    const duration    = 1800;
    const startTime   = performance.now();
    animating = true;

    function step(now) {
      const raw = (now - startTime) / duration;
      const t   = easeInOut(raw);
      camera.position.lerpVectors(startPos, targetPos, t);
      controls.target.lerpVectors(startTarget, endTarget, t);
      camera.fov = startFOV + (34 - startFOV) * t;
      camera.updateProjectionMatrix();
      controls.update();
      if (raw < 1.0) {
        animRafId = requestAnimationFrame(step);
      } else {
        camera.position.copy(targetPos);
        controls.target.copy(endTarget);
        camera.fov = 34;
        camera.updateProjectionMatrix();
        controls.enableDamping = true;
        controls.update();
        animating  = false;
        animRafId  = null;
      }
    }
    animRafId = requestAnimationFrame(step);
  }

  // ── Resize ───────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ── Init ─────────────────────────────────────────────────────
  selectLocation(0);
  loadGLB('globe.glb');

  // ── Render loop ──────────────────────────────────────────────
  function renderLoop() {
    requestAnimationFrame(renderLoop);
    if (!animating) controls.update();
    sun.position.copy(camera.position).normalize().multiplyScalar(10);
    sun.position.y += 3;
    atmoMeshes.forEach(m => {
      if (m.material.uniforms?.sunDir)
        m.material.uniforms.sunDir.value.copy(sun.position).normalize();
    });
    earthGroup.updateMatrixWorld(true);
    const camDir = camera.position.clone().normalize();
    flagEls.forEach(item => {
      const proj = item.pos3D.clone().project(camera);
      const x = (proj.x * 0.5 + 0.5) * innerWidth;
      const y = (proj.y * -0.5 + 0.5) * innerHeight;
      const dot = item.pos3D.clone().normalize().dot(camDir);
      const visible = dot > 0.05 && proj.z < 1.0;
      item.el.style.left    = x + 'px';
      item.el.style.top     = y + 'px';
      item.el.style.display = visible ? 'flex' : 'none';
      item.el.style.opacity = visible ? Math.min(1, (dot-0.05)*5) : '0';
      item.el.style.zIndex  = visible ? Math.round(dot*100) : 0;
    });
    renderer.render(scene, camera);
  }
  renderLoop();
</script>
</body>

</html>
